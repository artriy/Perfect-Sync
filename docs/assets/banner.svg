<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Perfect-Sync">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#150a2c"/>
      <stop offset="1" stop-color="#0a1430"/>
    </linearGradient>
    <radialGradient id="glowV" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(180 70) rotate(40) scale(520 360)">
      <stop offset="0" stop-color="#6b2db8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#6b2db8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1120 330) rotate(-30) scale(560 380)">
      <stop offset="0" stop-color="#0e4a8a" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#0e4a8a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowP" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1080 40) rotate(60) scale(420 320)">
      <stop offset="0" stop-color="#9b7bff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#9b7bff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9b7bff"/>
      <stop offset="1" stop-color="#5bc0ff"/>
    </linearGradient>
    <clipPath id="round"><rect x="0" y="0" width="1280" height="360" rx="30"/></clipPath>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="34"/></filter>
    <filter id="markGlow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="9"/></filter>
  </defs>

  <g clip-path="url(#round)">
    <rect width="1280" height="360" fill="url(#bg)"/>
    <g filter="url(#soft)">
      <ellipse cx="180" cy="70" rx="420" ry="320" fill="url(#glowV)"/>
      <ellipse cx="1120" cy="330" rx="480" ry="340" fill="url(#glowB)"/>
      <ellipse cx="1080" cy="40" rx="360" ry="280" fill="url(#glowP)"/>
    </g>
    <rect x="0" y="0" width="1280" height="1" fill="#ffffff" opacity="0.10"/>
  </g>
  <rect x="0.75" y="0.75" width="1278.5" height="358.5" rx="29" fill="none" stroke="#ffffff" stroke-opacity="0.10"/>

  <!-- sync mark: figure-eight stroked in the accent gradient -->
  <g transform="translate(150 180) scale(1.35)">
    <g filter="url(#markGlow)" opacity="0.7">
      <path d="M0 0 C0 -28 -40 -28 -40 0 S0 28 0 0 C0 -28 40 -28 40 0 S0 28 0 0 Z" fill="none" stroke="url(#accent)" stroke-width="11" stroke-linecap="round"/>
    </g>
    <path d="M0 0 C0 -28 -40 -28 -40 0 S0 28 0 0 C0 -28 40 -28 40 0 S0 28 0 0 Z" fill="none" stroke="url(#accent)" stroke-width="11" stroke-linecap="round"/>
    <circle cx="-40" cy="0" r="6.5" fill="#9b7bff"/>
    <circle cx="40" cy="0" r="6.5" fill="#5bc0ff"/>
  </g>

  <!-- wordmark + copy -->
  <text x="312" y="148" font-family="'Outfit','Segoe UI',system-ui,-apple-system,sans-serif" font-size="22" font-weight="600" letter-spacing="6" fill="#8d86b4">MODDED AMONG US MOD MANAGER</text>
  <text x="310" y="232" font-family="'Outfit','Segoe UI',system-ui,-apple-system,sans-serif" font-size="96" font-weight="700" letter-spacing="-1" fill="#f1ecff">Perfect<tspan fill="url(#accent)">-</tspan>Sync</text>
  <text x="312" y="288" font-family="'Outfit','Segoe UI',system-ui,-apple-system,sans-serif" font-size="32" font-weight="500" fill="#c8c0e8">One code. Same mods. Every crewmate.</text>
</svg>
