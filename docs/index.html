<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="color-scheme" content="dark" />
<title>Open in Perfect-Sync</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 20px;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(1100px 560px at 50% -10%, #1a1340, #0d0820); color: #ececf5;
  }
  .card {
    width: min(94vw, 460px); padding: 30px; border-radius: 20px; text-align: center;
    background: rgba(255,255,255,0.045); border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 24px 70px rgba(0,0,0,0.45);
  }
  .logo { width: 12px; height: 12px; border-radius: 4px; display: inline-block;
    background: linear-gradient(135deg,#9b7bff,#7b96ff); vertical-align: middle; margin-right: 8px; }
  h1 { font-size: 21px; margin: 0 0 4px; font-weight: 700; }
  p { color: #b9b4d0; font-size: 14px; line-height: 1.5; margin: 10px 0; }
  .lobby { color: #fff; font-weight: 700; }
  .btn {
    display: inline-block; margin-top: 14px; padding: 12px 24px; border-radius: 12px;
    background: linear-gradient(90deg,#9b7bff,#7b96ff); color: #0d0820; font-weight: 800;
    text-decoration: none; box-shadow: 0 10px 26px rgba(123,150,255,0.45);
  }
  code {
    display: block; margin-top: 16px; padding: 10px 12px; border-radius: 10px;
    background: rgba(0,0,0,0.35); color: #bfe0ff; font-size: 12px; word-break: break-all; font-family: ui-monospace, monospace;
  }
  .muted { color: #8b87a3; font-size: 12px; }
</style>
</head>
<body>
  <div class="card">
    <h1><span class="logo"></span>Opening Perfect-Sync…</h1>
    <p id="for"></p>
    <p>If your app didn't open automatically, click below.</p>
    <a class="btn" id="open" href="#">Open Perfect-Sync</a>
    <p class="muted">No app yet, or nothing happens? Copy this code and paste it into Perfect-Sync's lobby box:</p>
    <code id="code">—</code>
  </div>
<script>
  (function () {
    var params = new URLSearchParams(location.search);
    var code = decodeURIComponent((location.hash || "").replace(/^#/, "")) || params.get("c") || "";
    var name = params.get("lobby") || "";
    var deep = code ? "perfectsync://lobby/" + code : "";
    if (name) {
      document.getElementById("for").innerHTML = 'Lobby: <span class="lobby"></span>';
      document.querySelector("#for .lobby").textContent = name;
    }
    document.getElementById("code").textContent = code || "(no lobby code in this link)";
    var open = document.getElementById("open");
    if (deep) {
      open.setAttribute("href", deep);
      setTimeout(function () { location.href = deep; }, 300);
    }
  })();
</script>
</body>
</html>
